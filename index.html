<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>김승원 | Junior Developer</title>
    <link rel="stylesheet" href="Styles/Default_styles.css" />
    <link rel="stylesheet" href="Styles/wheel-menu.css" />
    <script src="Scripts/wheel-menu.js" defer></script>
  </head>
  <body>
    <main class="intro-page">
      <div class="laptop-shell">
        <div class="screen-surface">
          <section class="photo-stack" aria-label="사진 영역">
            <figure class="photo-card photo-card--note">
              <figcaption>
                이 세 박스는<br />본인의 사진을<br />첨부할 예정
              </figcaption>
            </figure>
            <figure
              class="photo-card photo-card--middle"
              aria-hidden="true"
            ></figure>
            <figure
              class="photo-card photo-card--bottom"
              aria-hidden="true"
            ></figure>
          </section>

          <section class="intro-copy" aria-label="소개">
            <p class="intro-role">Junior Developer</p>
            <h1 class="intro-name">김승원</h1>
          </section>

          <nav class="wheel-wrap" data-wheel-menu aria-label="주요 메뉴">
            <svg
              viewBox="0 0 520 520"
              preserveAspectRatio="none"
              xmlns="http://www.w3.org/2000/svg"
            ></svg>
          </nav>
        </div>
      </div>
    </main>
  </body>
</html>
